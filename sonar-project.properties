# SonarQube configuration for GymFlow
sonar.projectKey=gymflow
sonar.projectName=GymFlow - Gym Management System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/*.test.ts,**/*.spec.ts

# Language settings
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.exclusions=**/node_modules/**,**/dist/**,**/.next/**

# JavaScript configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test configuration
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.spec.ts,tests/e2e/**/*.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Coverage
sonar.coverage.exclusions=**/*.config.ts,**/*.config.js,**/node_modules/**,**/.next/**

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Measure duplication
sonar.cpd.exclusions=**/node_modules/**,**/dist/**,**/.next/**

# VCS
sonar.scm.provider=git
sonar.scm.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/package-lock.json
